scrCaseDetail As screen:
    Fill: =RGBA(244, 246, 248, 1)
    dRecHeader As label:
        Text: =""
        Fill: =RGBA(16, 94, 122, 1)
        X: =0
        Y: =0
        Width: =Parent.Width
        Height: =84
    dBtnBack As button:
        Text: ="‹  Back"
        Color: =RGBA(255, 255, 255, 1)
        Fill: =RGBA(16, 94, 122, 1)
        HoverFill: =RGBA(13, 78, 102, 1)
        BorderColor: =RGBA(255, 255, 255, 1)
        BorderThickness: =1
        RadiusTopLeft: =8
        RadiusTopRight: =8
        RadiusBottomLeft: =8
        RadiusBottomRight: =8
        X: =24
        Y: =22
        Width: =110
        Height: =40
        OnSelect: =Navigate(Screen1, ScreenTransition.UnCover)
    dLblRef As label:
        Text: =varCase.'Case Reference'
        Color: =RGBA(255, 255, 255, 1)
        X: =160
        Y: =22
        Width: =500
        Height: =40
        Size: =22
        FontWeight: =FontWeight.Semibold
    dBanner As label:
        Text: ="SLA status  —  " & varCase.'SLA Status'
        Color: =RGBA(255, 255, 255, 1)
        Fill: =Switch(true, varCase.'SLA Status' = 'SLA Status (Hazard Cases)'.Breached, RGBA(200, 32, 32, 1), varCase.'SLA Status' = 'SLA Status (Hazard Cases)'.'At Risk', RGBA(214, 158, 46, 1), RGBA(16, 124, 86, 1))
        X: =0
        Y: =84
        Width: =Parent.Width
        Height: =40
        Size: =14
        FontWeight: =FontWeight.Semibold
        Align: =Align.Center
    dCapProp As label:
        Text: ="PROPERTY"
        Color: =RGBA(140, 140, 140, 1)
        X: =40
        Y: =150
        Width: =380
        Height: =20
        Size: =10
    dValProp As label:
        Text: =If(IsBlank(varCase.Property.'Address Line 1'), "— not yet linked —", varCase.Property.'Address Line 1')
        Color: =RGBA(32, 32, 32, 1)
        X: =40
        Y: =170
        Width: =380
        Height: =28
        Size: =15
    dCapRes As label:
        Text: ="RESIDENT"
        Color: =RGBA(140, 140, 140, 1)
        X: =40
        Y: =214
        Width: =380
        Height: =20
        Size: =10
    dValRes As label:
        Text: =If(IsBlank(varCase.Resident.'Full Name'), "— not yet linked —", varCase.Resident.'Full Name')
        Color: =RGBA(32, 32, 32, 1)
        X: =40
        Y: =234
        Width: =380
        Height: =28
        Size: =15
    dCapType As label:
        Text: ="HAZARD TYPE"
        Color: =RGBA(140, 140, 140, 1)
        X: =40
        Y: =278
        Width: =380
        Height: =20
        Size: =10
    dValType As label:
        Text: =varCase.'Hazard Type'
        Color: =RGBA(32, 32, 32, 1)
        X: =40
        Y: =298
        Width: =380
        Height: =28
        Size: =15
    dCapSev As label:
        Text: ="SEVERITY"
        Color: =RGBA(140, 140, 140, 1)
        X: =40
        Y: =342
        Width: =380
        Height: =20
        Size: =10
    dValSev As label:
        Text: =If(IsBlank(varCase.Severity), "Not yet triaged", varCase.Severity)
        Color: =If(varCase.Severity = 'Severity (Hazard Cases)'.'Emergency (24hr)', RGBA(200, 32, 32, 1), RGBA(32, 32, 32, 1))
        FontWeight: =If(varCase.Severity = 'Severity (Hazard Cases)'.'Emergency (24hr)', FontWeight.Semibold, FontWeight.Normal)
        X: =40
        Y: =362
        Width: =380
        Height: =28
        Size: =15
    dCapReported As label:
        Text: ="REPORTED"
        Color: =RGBA(140, 140, 140, 1)
        X: =450
        Y: =150
        Width: =380
        Height: =20
        Size: =10
    dValReported As label:
        Text: =Text(varCase.'Reported Date', "dd mmm yyyy")
        Color: =RGBA(32, 32, 32, 1)
        X: =450
        Y: =170
        Width: =380
        Height: =28
        Size: =15
    dCapInv As label:
        Text: ="INVESTIGATION DEADLINE"
        Color: =RGBA(140, 140, 140, 1)
        X: =450
        Y: =214
        Width: =380
        Height: =20
        Size: =10
    dValInv As label:
        Text: =If(IsBlank(varCase.'Investigation Deadline'), "Not set", Text(varCase.'Investigation Deadline', "dd mmm yyyy"))
        Color: =RGBA(32, 32, 32, 1)
        X: =450
        Y: =234
        Width: =380
        Height: =28
        Size: =15
    dCapRep As label:
        Text: ="REPAIR DEADLINE"
        Color: =RGBA(140, 140, 140, 1)
        X: =450
        Y: =278
        Width: =380
        Height: =20
        Size: =10
    dValRep As label:
        Text: =If(IsBlank(varCase.'Repair Deadline'), "Not set", Text(varCase.'Repair Deadline', "dd mmm yyyy"))
        Color: =RGBA(32, 32, 32, 1)
        X: =450
        Y: =298
        Width: =380
        Height: =28
        Size: =15
    dCapContact As label:
        Text: ="REPORTER CONTACT"
        Color: =RGBA(140, 140, 140, 1)
        X: =450
        Y: =342
        Width: =380
        Height: =20
        Size: =10
    dValContact As label:
        Text: =If(IsBlank(varCase.Resident.'Contact Number'), "—", varCase.Resident.'Contact Number')
        Color: =RGBA(32, 32, 32, 1)
        X: =450
        Y: =362
        Width: =380
        Height: =28
        Size: =15
    dCapDesc As label:
        Text: ="DETAILS"
        Color: =RGBA(140, 140, 140, 1)
        X: =40
        Y: =410
        Width: =790
        Height: =20
        Size: =10
    dValDesc As label:
        Text: =varCase.Description
        Color: =RGBA(50, 50, 50, 1)
        Fill: =RGBA(255, 255, 255, 1)
        X: =40
        Y: =432
        Width: =790
        Height: =230
        Size: =13
    dCard As label:
        Text: =""
        Fill: =RGBA(255, 255, 255, 1)
        BorderColor: =RGBA(224, 228, 232, 1)
        BorderThickness: =1
        X: =880
        Y: =150
        Width: =440
        Height: =360
    dCardTitle As label:
        Text: ="Triage & update"
        Color: =RGBA(32, 32, 32, 1)
        X: =910
        Y: =172
        Width: =380
        Height: =32
        Size: =17
        FontWeight: =FontWeight.Semibold
    dCapStatus As label:
        Text: ="Status"
        Color: =RGBA(90, 90, 90, 1)
        X: =910
        Y: =222
        Width: =380
        Height: =22
        Size: =12
        FontWeight: =FontWeight.Semibold
    dDrpStatus As dropdown:
        Items: =['Status (Hazard Cases)'.New, 'Status (Hazard Cases)'.Triaged, 'Status (Hazard Cases)'.'Investigation Booked', 'Status (Hazard Cases)'.Investigated, 'Status (Hazard Cases)'.'Repair Scheduled', 'Status (Hazard Cases)'.'In Progress', 'Status (Hazard Cases)'.Resolved, 'Status (Hazard Cases)'.Closed]
        Default: =varCase.'Status (hg_status)'
        Fill: =RGBA(255, 255, 255, 1)
        X: =910
        Y: =246
        Width: =380
        Height: =44
    dCapSevEdit As label:
        Text: ="Severity"
        Color: =RGBA(90, 90, 90, 1)
        X: =910
        Y: =304
        Width: =380
        Height: =22
        Size: =12
        FontWeight: =FontWeight.Semibold
    dDrpSeverity As dropdown:
        Items: =['Severity (Hazard Cases)'.'Emergency (24hr)', 'Severity (Hazard Cases)'.Significant, 'Severity (Hazard Cases)'.Moderate, 'Severity (Hazard Cases)'.Minor]
        Default: =varCase.Severity
        Fill: =RGBA(255, 255, 255, 1)
        X: =910
        Y: =328
        Width: =380
        Height: =44
    dHint As label:
        Text: ="Deadlines & SLA are calculated automatically from severity on save (Awaab's Law)."
        Color: =RGBA(120, 120, 120, 1)
        X: =910
        Y: =464
        Width: =380
        Height: =40
        Size: =10
    dBtnSave As button:
        Text: ="Save changes"
        Color: =RGBA(255, 255, 255, 1)
        Fill: =RGBA(16, 124, 86, 1)
        HoverFill: =RGBA(13, 105, 73, 1)
        BorderColor: =RGBA(16, 124, 86, 1)
        Size: =16
        FontWeight: =FontWeight.Semibold
        RadiusTopLeft: =10
        RadiusTopRight: =10
        RadiusBottomLeft: =10
        RadiusBottomRight: =10
        X: =910
        Y: =400
        Width: =380
        Height: =50
        OnSelect: |
            =Set(varInvDue, If(dDrpSeverity.Selected.Value = 'Severity (Hazard Cases)'.'Emergency (24hr)', DateAdd(varCase.'Reported Date', 1, TimeUnit.Days), DateAdd(varCase.'Reported Date', 14, TimeUnit.Days)));
            Set(varRepDue, DateAdd(varInvDue, 7, TimeUnit.Days));
            Patch(
                'Hazard Cases',
                varCase,
                {
                    Severity: dDrpSeverity.Selected.Value,
                    'Status (hg_status)': dDrpStatus.Selected.Value,
                    'Investigation Deadline': varInvDue,
                    'Repair Deadline': varRepDue,
                    'SLA Status': If(
                        dDrpStatus.Selected.Value = 'Status (Hazard Cases)'.Resolved || dDrpStatus.Selected.Value = 'Status (Hazard Cases)'.Closed,
                        'SLA Status (Hazard Cases)'.'On Track',
                        If(Now() > varRepDue, 'SLA Status (Hazard Cases)'.Breached,
                           If(Now() > varInvDue, 'SLA Status (Hazard Cases)'.'At Risk', 'SLA Status (Hazard Cases)'.'On Track'))
                    )
                }
            );
            Notify("Case " & varCase.'Case Reference' & " triaged — Awaab's Law deadlines set.", NotificationType.Success);
            Navigate(Screen1, ScreenTransition.UnCover)
